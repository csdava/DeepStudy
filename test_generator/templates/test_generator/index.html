<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试题生成器</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .feature-icon {
            font-size: 2rem;
            color: #0d6efd;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 text-center">
                <h1 class="display-4 mb-3">智能试题生成器</h1>
                <p class="lead text-muted">基于AI技术，快速生成个性化试题</p>
                <div class="mt-4">
                    <a href="{% url 'generate_test' %}" class="btn btn-primary btn-lg px-4">开始生成试题</a>
                </div>
            </div>
        </div>

        <div class="row g-4 py-4">
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <div class="feature-icon">📚</div>
                        <h3 class="card-title">自定义知识点</h3>
                        <p class="card-text">可以输入任意学科和知识点，生成相应的试题</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <div class="feature-icon">🎯</div>
                        <h3 class="card-title">多种题型</h3>
                        <p class="card-text">支持选择题、填空题和简答题等多种题型</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <div class="feature-icon">⚡</div>
                        <h3 class="card-title">快速生成</h3>
                        <p class="card-text">基于AI技术，秒级生成高质量试题</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">使用说明</h4>
                        <ol class="list-group list-group-numbered">
                            <li class="list-group-item">点击"开始生成试题"按钮</li>
                            <li class="list-group-item">输入具体的知识点（如：数学-函数、语文-文言文等）</li>
                            <li class="list-group-item">选择题型、数量和难度级别</li>
                            <li class="list-group-item">点击生成按钮，即可获得试题</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
