<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业管理系统</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
        }
        h1 {
            text-align: center;
            margin: 0;
            padding: 1rem 0;
        }
        nav {
            background-color: #34495e;
            padding: 0.5rem;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        nav ul li {
            margin: 0.5rem 1rem;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        nav ul li a:hover {
            background-color: #2980b9;
        }
        main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>作业管理系统</h1>
        <nav>
            <ul>
                {% if user.is_authenticated %}
                    {% if user.is_staff %}
                        <!-- 教师导航 -->
                        <li><a href="{% url 'task_assignment:create_task' %}">创建作业</a></li>
                        <li><a href="{% url 'task_assignment:view_submissions' task_id=1 %}">查看提交</a></li>
                    {% else %}
                        <!-- 学生导航 -->
                        <li><a href="{% url 'task_assignment:view_tasks' %}">查看作业</a></li>
                        <li><a href="{% url 'task_assignment:view_grades' %}">查看成绩</a></li>
                    {% endif %}
                    <li><a href="{% url 'logout' %}">退出登录</a></li>
                {% else %}
                    <li><a href="{% url 'login' %}">登录</a></li>
                {% endif %}
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
