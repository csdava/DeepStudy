<!DOCTYPE html>
<html>
</head>
<body>
    <h1>我的任务列表</h1>
    <ul>
        {% for assignment in assignments %}
            <li>
                <a href="{% url 'task_submit' assignment.id %}">{{ assignment.task.name }}</a>
                <p>截止日期：{{ assignment.task.due_date }}</p>
                <p>提交状态：{% if assignment.submissions.exists %}已提交{% else %}未提交{% endif %}</p>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
