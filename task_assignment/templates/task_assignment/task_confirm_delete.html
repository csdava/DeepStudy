{% extends 'base.html' %}

{% block title %}任务管理系统 - 确认删除{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">确认删除</h3>
                </div>
                <div class="card-body">
                    <p>您确定要删除任务 "{{ task.title }}" 吗？</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">确认删除</button>
                            <a href="{% url 'task_assignment:task_list' %}" class="btn btn-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
