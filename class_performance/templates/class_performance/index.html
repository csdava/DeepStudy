<!DOCTYPE html>
<html>
<head>
    <title>Class Performance</title>
</head>
<body>
    <h1>Class Performance Ranking</h1>
    <table border="1">
        <tr>
            <th>Rank</th>
            <th>Student Name</th>
            <th>Score</th>
        </tr>
        {% for student, score in student_ranking %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ student.name }}</td>
            <td>{{ score }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'charts' %}">View Charts</a>
    <a href="{% url 'report' %}">View Report</a>
</body>
</html>
