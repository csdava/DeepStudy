{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mb-4">{{ title }}</h1>
    
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fas fa-trophy"></i> 成绩排名
                    </h5>
                    <p class="card-text">查看学生的综合表现排名，包括作业、考试、课堂互动等多个维度的评分。</p>
                    <a href="{% url 'class_performance:ranking' %}" class="btn btn-primary">
                        查看排名 <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
        
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fas fa-chart-bar"></i> 班级报告
                    </h5>
                    <p class="card-text">查看班级整体的学习表现分析报告，包括平均分、参与度等统计数据。</p>
                    <a href="{% url 'class_performance:report' %}" class="btn btn-primary">
                        查看报告 <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
