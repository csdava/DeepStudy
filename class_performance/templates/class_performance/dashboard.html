{% extends 'base.html' %}

{% block title %}成绩分析 - 教师端{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">成绩分析</h2>
    
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="form-group">
                <label for="classSelect">选择班级：</label>
                <select class="form-control" id="classSelect">
                    <option value="">请选择班级</option>
                    {% for class in classes %}
                    <option value="{{ class.id }}">{{ class.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-group">
                <label for="studentSelect">选择学生：</label>
                <select class="form-control" id="studentSelect" disabled>
                    <option value="">请先选择班级</option>
                </select>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">班级成绩趋势</h5>
                </div>
                <div class="card-body">
                    <canvas id="classChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">学生成绩趋势</h5>
                </div>
                <div class="card-body">
                    <canvas id="studentChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 初始化图表
    const classCtx = document.getElementById('classChart').getContext('2d');
    const studentCtx = document.getElementById('studentChart').getContext('2d');

    const classChart = new Chart(classCtx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: '班级平均分',
                data: [],
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: false,
                    min: 0,
                    max: 100
                }
            }
        }
    });

    const studentChart = new Chart(studentCtx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: '学生成绩',
                data: [],
                borderColor: 'rgb(255, 99, 132)',
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: false,
                    min: 0,
                    max: 100
                }
            }
        }
    });

    // 生成随机成绩数据
    function generateRandomScores() {
        const dates = [];
        const scores = [];
        const baseDate = new Date();
        
        for (let i = 4; i >= 0; i--) {
            const date = new Date(baseDate);
            date.setMonth(date.getMonth() - i);
            dates.push(date.toISOString().slice(0, 10));
            scores.push(Math.floor(Math.random() * 40) + 60); // 60~100之间的随机数
        }
        return { dates, scores };
    }

    // 事件监听
    document.getElementById('classSelect').addEventListener('change', function() {
        const classId = this.value;
        if (classId) {
            // 生成随机班级成绩数据
            const classData = generateRandomScores();
            classChart.data.labels = classData.dates;
            classChart.data.datasets[0].data = classData.scores;
            classChart.update();

            // 获取学生列表
            fetch(`/class_performance/get_students/?class_id=${classId}`)
                .then(response => response.json())
                .then(data => {
                    const studentSelect = document.getElementById('studentSelect');
                    studentSelect.innerHTML = '<option value="">请选择学生</option>';
                    data.students.forEach(student => {
                        studentSelect.innerHTML += `<option value="${student.id}">${student.name}</option>`;
                    });
                    studentSelect.disabled = false;
                })
                .catch(error => {
                    console.error('Error fetching students:', error);
                });
        } else {
            document.getElementById('studentSelect').disabled = true;
            document.getElementById('studentSelect').innerHTML = '<option value="">请先选择班级</option>';
        }
    });

    document.getElementById('studentSelect').addEventListener('change', function() {
        const studentId = this.value;
        if (studentId) {
            // 生成随机学生成绩数据
            const studentData = generateRandomScores();
            studentChart.data.labels = studentData.dates;
            studentChart.data.datasets[0].data = studentData.scores;
            studentChart.update();
        }
    });
});
</script>
{% endblock %}
