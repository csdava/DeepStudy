{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepStudent - 智能学习平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4rem 0;
        }
        .feature-card {
            border: none;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-5px);
        }
        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #667eea;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">DeepStudent</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/class_management/">课程管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/class_performance/">学习表现</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/resource_library/">资源库</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">管理入口</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主要内容区 -->
    <section class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 mb-4">欢迎使用 DeepStudent 智能学习平台</h1>
            <p class="lead mb-4">基于人工智能的个性化学习体验，助力每位学生实现学习目标</p>
            <button class="btn btn-light btn-lg">开始学习</button>
        </div>
    </section>

    <!-- 特色功能区 -->
    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-5">平台特色</h2>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card feature-card h-100 shadow-sm">
                        <div class="card-body text-center">
                            <div class="feature-icon">📚</div>
                            <h5 class="card-title">智能学习路径</h5>
                            <p class="card-text">根据个人学习情况，自动生成最优学习路径，让学习更有效率。</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card feature-card h-100 shadow-sm">
                        <div class="card-body text-center">
                            <div class="feature-icon">📊</div>
                            <h5 class="card-title">实时学习分析</h5>
                            <p class="card-text">全方位跟踪学习进度，及时发现问题，提供针对性建议。</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card feature-card h-100 shadow-sm">
                        <div class="card-body text-center">
                            <div class="feature-icon">🎯</div>
                            <h5 class="card-title">个性化练习</h5>
                            <p class="card-text">智能出题系统，根据学习水平自动调整难度，确保学习效果。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2024 DeepStudent. 保留所有权利。</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
