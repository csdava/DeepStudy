{% extends 'class_management/base.html' %}

{% block title %}编辑班级{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">编辑班级</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">班级名称</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ class.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="grade" class="form-label">年级</label>
                        <input type="text" class="form-control" id="grade" name="grade" value="{{ class.grade }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="subject" class="form-label">学科</label>
                        <input type="text" class="form-control" id="subject" name="subject" value="{{ class.subject }}" required>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">保存修改</button>
                        <a href="{% url 'class_management:class_info' %}" class="btn btn-secondary">返回</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
