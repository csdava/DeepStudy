{% extends 'class_management/base.html' %}

{% block title %}权限设置 - {{ class_info.name }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">权限设置 - {{ class_info.name }}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="permission_view_scores" name="permission_view_scores"
                                   {% if class_info.permission_view_scores %}checked{% endif %}>
                            <label class="form-check-label" for="permission_view_scores">
                                允许学生查看成绩
                            </label>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="homework_deadline" class="form-label">作业提交截止时间</label>
                        <input type="datetime-local" class="form-control" id="homework_deadline" name="homework_deadline"
                               value="{% if class_info.homework_deadline %}{{ class_info.homework_deadline|date:'Y-m-d\TH:i' }}{% endif %}">
                        <div class="form-text">留空表示没有截止时间限制</div>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">保存设置</button>
                        <a href="{% url 'class_management:class_info' %}" class="btn btn-secondary">返回</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
