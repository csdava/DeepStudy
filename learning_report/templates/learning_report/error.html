{% extends 'base.html' %}

{% block title %}错误{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-body text-center">
                    <h3 class="text-danger mb-4">出错了</h3>
                    <p class="lead">{{ error_message }}</p>
                    <a href="{% url 'learning_report:report_list' %}" class="btn btn-primary mt-3">
                        返回报告列表
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
