{% extends 'base.html' %}

{% block title %}生成学习周报{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-body text-center">
                    <h3>正在生成学习周报...</h3>
                    <div class="spinner-border text-primary mt-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3">
                        正在收集和分析 {{ start_date|date:"Y-m-d" }} 至 {{ end_date|date:"Y-m-d" }} 的学习数据，
                        请稍候...
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 3秒后自动跳转到报告详情页
    setTimeout(function() {
        window.location.href = "{% url 'report_detail' report.id %}";
    }, 3000);
</script>
{% endblock %}
