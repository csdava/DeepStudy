{% extends 'base.html' %}

{% block title %}学习报告 - 深度学习助手{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h1 class="mb-2">学习报告</h1>
            <p class="lead">查看您的学习进度与作业情况</p>
        </div>
        <div class="col-md-4 text-end">
            <a href="{% url 'learning_report:report_list' %}" class="btn btn-outline-primary me-2">返回报告列表</a>
            <button class="btn btn-primary" onclick="generateReport()">生成报告</button>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-body text-center">
                                    <i class="fas fa-clock fa-2x mb-2" style="color: #764ba2;"></i>
                                    <h5 class="card-title">学习时间</h5>
                                    <p class="card-text display-6 mb-0" id="studyTime">--:--</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-body text-center">
                                    <i class="fas fa-tasks fa-2x mb-2" style="color: #764ba2;"></i>
                                    <h5 class="card-title">学习进度</h5>
                                    <div class="progress" style="height: 25px;">
                                        <div class="progress-bar" id="studyProgress" role="progressbar" style="width: 0%"></div>
                                    </div>
                                    <p class="mt-2 mb-0" id="studyProgressText">0%</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-body text-center">
                                    <i class="fas fa-upload fa-2x mb-2" style="color: #764ba2;"></i>
                                    <h5 class="card-title">作业提交率</h5>
                                    <div class="progress" style="height: 25px;">
                                        <div class="progress-bar bg-success" id="homeworkSubmission" role="progressbar" style="width: 0%"></div>
                                    </div>
                                    <p class="mt-2 mb-0" id="homeworkSubmissionText">0%</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-body text-center">
                                    <i class="fas fa-check-circle fa-2x mb-2" style="color: #764ba2;"></i>
                                    <h5 class="card-title">作业正确率</h5>
                                    <div class="progress" style="height: 25px;">
                                        <div class="progress-bar bg-info" id="homeworkAccuracy" role="progressbar" style="width: 0%"></div>
                                    </div>
                                    <p class="mt-2 mb-0" id="homeworkAccuracyText">0%</p>
                                </div>
                            </div>
                        </div>
                    </div> <!-- row -->
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function generateReport() {
        // 生成随机数据
        const studyTime = Math.floor(Math.random() * 60) + 1; // 1-60分钟
        const studyProgress = Math.floor(Math.random() * 100); // 0-100%
        const homeworkSubmission = Math.floor(Math.random() * 100); // 0-100%
        const homeworkAccuracy = Math.floor(Math.random() * 100); // 0-100%

        // 更新显示
        document.getElementById('studyTime').textContent = `${studyTime} 分钟`;
        document.getElementById('studyProgress').style.width = `${studyProgress}%`;
        document.getElementById('studyProgressText').textContent = `${studyProgress}%`;
        document.getElementById('homeworkSubmission').style.width = `${homeworkSubmission}%`;
        document.getElementById('homeworkSubmissionText').textContent = `${homeworkSubmission}%`;
        document.getElementById('homeworkAccuracy').style.width = `${homeworkAccuracy}%`;
        document.getElementById('homeworkAccuracyText').textContent = `${homeworkAccuracy}%`;
    }
    window.onload = generateReport;
</script>
{% endblock %}
