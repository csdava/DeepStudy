{% extends 'base.html' %}
{% load static %}

{% block title %}学习报告列表 - 深度学习助手{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h1 class="mb-4">学习报告列表</h1>
        </div>
        <div class="col-md-4 text-end">
             <a href="{% url 'learning_report:report' %}" class="btn btn-primary">生成新报告</a>
             <a href="{% url 'student_dashboard' %}" class="btn btn-secondary">返回控制台</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h2 class="card-title text-center mb-4">学习报告记录</h2>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>学习时间</th>
                            <th>学习进度</th>
                            <th>作业提交率</th>
                            <th>作业正确率</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="reportList">
                        <!-- 报告列表将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function generateRandomReport() {
        return {
            date: new Date().toLocaleDateString(),
            studyTime: Math.floor(Math.random() * 60) + 1,
            studyProgress: Math.floor(Math.random() * 100),
            homeworkSubmission: Math.floor(Math.random() * 100),
            homeworkAccuracy: Math.floor(Math.random() * 100)
        };
    }

    function displayReports() {
        const reportList = document.getElementById('reportList');
        reportList.innerHTML = '';

        // 生成5个随机报告
        for (let i = 0; i < 5; i++) {
            const report = generateRandomReport();
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${report.date}</td>
                <td>${report.studyTime} 分钟</td>
                <td>${report.studyProgress}%</td>
                <td>${report.homeworkSubmission}%</td>
                <td>${report.homeworkAccuracy}%</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="viewReport(${i})">查看详情</button>
                </td>
            `;
            reportList.appendChild(row);
        }
    }

    function viewReport(index) {
        // 跳转到报告详情页面
        window.location.href = `{% url 'learning_report:report' %}`;
    }

    // 页面加载时显示报告列表
    document.addEventListener('DOMContentLoaded', displayReports);
</script>
{% endblock %}
