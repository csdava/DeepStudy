<!-- diagnosis_form.html -->
<!DOCTYPE html>
<html>
<head>
    <title>错题诊断</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">错题诊断提交</h2>
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                {% for field in form %}
                <div class="col-12">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                    <div class="form-text">{{ field.help_text }}</div>
                    {% endif %}
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary mt-3">提交诊断</button>
        </form>
    </div>
</body>
</html>
