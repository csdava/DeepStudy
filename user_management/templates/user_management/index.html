{% extends 'user_management/base.html' %}

{% block content %}
<div style="text-align: center;">
    <h1>欢迎使用用户管理系统</h1>
    <p>请使用上方导航栏访问不同功能</p>
    <div style="margin-top: 2rem;">
        <h2>系统功能说明：</h2>
        <ul style="list-style: none; padding: 0;">
            <li style="margin: 1rem 0;">📝 用户注册 - 新用户可以在这里创建账号</li>
            <li style="margin: 1rem 0;">🔑 用户登录 - 已有账号的用户在此登录</li>
            <li style="margin: 1rem 0;">👤 个人信息 - 查看和修改您的个人资料</li>
            <li style="margin: 1rem 0;">🔒 修改密码 - 更改您的账号密码</li>
            <li style="margin: 1rem 0;">👥 用户管理 - 管理员可以在这里管理所有用户</li>
        </ul>
    </div>
</div>
{% endblock %}
