{% extends 'base.html' %}

{% block title %}发表帖子 - {{ topic.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title mb-0">在"{{ topic.name }}"中发表帖子</h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.content.id_for_label }}" class="form-label">帖子内容</label>
                        {{ form.content.errors }}
                        <textarea class="form-control" id="{{ form.content.id_for_label }}" name="{{ form.content.name }}" rows="6" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.attachment.id_for_label }}" class="form-label">附件（可选）</label>
                        {{ form.attachment.errors }}
                        <input type="file" class="form-control" id="{{ form.attachment.id_for_label }}" name="{{ form.attachment.name }}">
                    </div>
                    <div class="text-end">
                        <a href="{% url 'topic_details' topic.id %}" class="btn btn-outline-secondary me-2">取消</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i> 发表帖子
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
