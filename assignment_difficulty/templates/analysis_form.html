<!-- templates/assignment_difficulty/analysis_form.html -->
{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">作业难度分析提交</h2>
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">基础信息</h5>
                        {{ form.subject|as_crispy_field }}
                        {{ form.grade|as_crispy_field }}
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">作业内容</h5>
                        {{ form.assignment_content|as_crispy_field }}
                    </div>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary mt-3">开始分析</button>
    </form>
</div>
{% endblock %}
