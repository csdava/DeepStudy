{% extends "base.html" %}

{% block title %}分析错误{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title text-danger mb-4">
                        <i class="bi bi-exclamation-triangle"></i> 分析过程中出现错误
                    </h2>
                    
                    <div class="alert alert-danger">
                        {{ error_message }}
                    </div>

                    {% if raw_response %}
                    <div class="mt-4">
                        <h5>原始响应：</h5>
                        <pre class="bg-light p-3 rounded"><code>{{ raw_response }}</code></pre>
                    </div>
                    {% endif %}

                    <div class="mt-4">
                        <a href="{% url 'difficulty_analysis' %}" class="btn btn-primary">
                            <i class="bi bi-arrow-left"></i> 返回分析表单
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
